<svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle 
    cx="50" 
    cy="50" 
    r="20" 
    stroke="#e5e7eb" 
    stroke-width="4"
  />
  <circle 
    cx="50" 
    cy="50" 
    r="20" 
    stroke="#465FFF" 
    stroke-width="4"
    stroke-linecap="round"
    stroke-dasharray="200"
    stroke-dashoffset="150"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="1s"
      repeatCount="indefinite"
    />
  </circle>
</svg>